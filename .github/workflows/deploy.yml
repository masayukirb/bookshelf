name: Deploy BookShelf

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: APIキーを埋め込む
        run: |
          sed -i "s|__GOOGLE_BOOKS_API_KEY__|${{ secrets.GOOGLE_BOOKS_API_KEY }}|g" index.html

      - name: GitHub Pages設定
        uses: actions/configure-pages@v4

      - name: アーティファクトをアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./

      - name: GitHub Pagesにデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
