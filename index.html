<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookShelf</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=DM+Mono:wght@300;400;500&display=swap');

  :root {
    --ink: #1a1410;
    --paper: #f5f0e8;
    --paper-dark: #ede6d6;
    --accent: #c0392b;
    --accent-soft: #e8d5d3;
    --rule: #c8b89a;
    --muted: #8a7a68;
    --highlight: #f0c040;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Shippori Mincho', serif;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  /* 和紙テクスチャ風の背景 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 27px, var(--rule) 27px, var(--rule) 28px),
      repeating-linear-gradient(90deg, transparent, transparent 27px, rgba(200,184,154,0.2) 27px, rgba(200,184,154,0.2) 28px);
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    z-index: 1;
  }

  /* ヘッダー */
  header {
    padding: 48px 0 32px;
    border-bottom: 2px solid var(--ink);
    display: flex;
    align-items: baseline;
    gap: 20px;
  }

  .logo {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
  }

  .logo span {
    color: var(--accent);
  }

  .tagline {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-left: 1px solid var(--rule);
    padding-left: 16px;
  }

  /* 検索エリア */
  .search-section {
    padding: 32px 0 24px;
  }

  .search-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  .search-icon {
    position: absolute;
    left: 16px;
    font-size: 18px;
    color: var(--muted);
    pointer-events: none;
  }

  #searchInput {
    width: 100%;
    padding: 16px 16px 16px 48px;
    font-family: 'Shippori Mincho', serif;
    font-size: 18px;
    background: white;
    border: 2px solid var(--ink);
    color: var(--ink);
    outline: none;
    transition: box-shadow 0.2s;
    box-shadow: 4px 4px 0 var(--ink);
  }

  #searchInput:focus {
    box-shadow: 6px 6px 0 var(--accent);
    border-color: var(--accent);
  }

  #searchInput::placeholder {
    color: var(--rule);
  }

  .search-hint {
    margin-top: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* ツールバー */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    margin-bottom: 24px;
    gap: 12px;
    flex-wrap: wrap;
  }

  .book-count {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .book-count strong {
    color: var(--ink);
    font-size: 20px;
    font-weight: 500;
  }

  .add-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: var(--ink);
    color: var(--paper);
    font-family: 'Shippori Mincho', serif;
    font-size: 14px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 3px 3px 0 var(--accent);
  }

  .add-btn:hover {
    transform: translate(-1px, -1px);
    box-shadow: 4px 4px 0 var(--accent);
  }

  .add-btn:active {
    transform: translate(1px, 1px);
    box-shadow: 2px 2px 0 var(--accent);
  }

  /* OneDriveボタン */
  .onedrive-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: #0078d4;
    color: white;
    font-family: 'Shippori Mincho', serif;
    font-size: 14px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 3px 3px 0 #004e8c;
  }

  .onedrive-btn:hover {
    transform: translate(-1px, -1px);
    box-shadow: 4px 4px 0 #004e8c;
  }

  .onedrive-btn:active {
    transform: translate(1px, 1px);
    box-shadow: 2px 2px 0 #004e8c;
  }

  .onedrive-btn.connected {
    background: #107c10;
    box-shadow: 3px 3px 0 #054b05;
  }

  .onedrive-btn.connected:hover {
    box-shadow: 4px 4px 0 #054b05;
  }

  /* OneDriveステータスバー */
  .onedrive-status {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    padding: 8px 0;
    display: none;
  }

  .onedrive-status.visible { display: block; }

  /* フォルダ選択モーダル */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26,20,16,0.6);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .modal {
    background: var(--paper);
    border: 2px solid var(--ink);
    box-shadow: 6px 6px 0 var(--ink);
    max-width: 480px;
    width: 100%;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
  }

  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
  }

  .modal-title {
    font-size: 18px;
    font-weight: 600;
  }

  .modal-close {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 18px;
    color: var(--muted);
    line-height: 1;
    padding: 0;
  }

  .modal-close:hover { color: var(--ink); }

  .modal-body {
    padding: 16px 24px;
    overflow-y: auto;
    flex: 1;
  }

  .modal-hint {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .folder-list { display: flex; flex-direction: column; gap: 2px; }

  .folder-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.1s;
    font-size: 15px;
  }

  .folder-item:hover {
    background: rgba(255,255,255,0.7);
    border-color: var(--rule);
  }

  .folder-item.selected {
    background: var(--accent-soft);
    border-color: var(--accent);
  }

  .folder-item-icon { font-size: 18px; flex-shrink: 0; }

  .folder-item-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .folder-item-arrow {
    font-size: 12px;
    color: var(--muted);
    flex-shrink: 0;
  }

  .folder-breadcrumb {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .breadcrumb-item {
    cursor: pointer;
    color: var(--accent);
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .folder-loading {
    padding: 24px;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--rule);
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    align-items: center;
  }

  .modal-selected-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .btn-cancel {
    padding: 8px 16px;
    background: none;
    border: 1px solid var(--rule);
    font-family: 'Shippori Mincho', serif;
    font-size: 13px;
    cursor: pointer;
    color: var(--muted);
  }

  .btn-cancel:hover { border-color: var(--ink); color: var(--ink); }

  .btn-confirm {
    padding: 8px 20px;
    background: #0078d4;
    color: white;
    border: none;
    font-family: 'Shippori Mincho', serif;
    font-size: 13px;
    cursor: pointer;
    box-shadow: 2px 2px 0 #004e8c;
  }

  .btn-confirm:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
  .btn-confirm:not(:disabled):hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 #004e8c; }

  /* ドロップゾーン */
  .drop-zone {
    border: 2px dashed var(--rule);
    padding: 40px;
    text-align: center;
    margin-bottom: 24px;
    transition: all 0.2s;
    cursor: pointer;
    display: none;
    background: rgba(255,255,255,0.5);
  }

  .drop-zone.active-zone {
    display: block;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-soft);
  }

  .drop-zone-icon { font-size: 40px; margin-bottom: 12px; }

  .drop-zone-text {
    font-size: 16px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .drop-zone-sub {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--rule);
  }

  #fileInput { display: none; }

  /* 進捗バー */
  .progress-bar {
    height: 3px;
    background: var(--paper-dark);
    margin-bottom: 24px;
    display: none;
    overflow: hidden;
  }

  .progress-bar.active { display: block; }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s ease;
    width: 0%;
  }

  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
    display: none;
  }

  .progress-label.active { display: block; }

  /* 書籍リスト */
  #bookList { display: flex; flex-direction: column; gap: 0; }

  .book-card {
    border-top: 1px solid var(--rule);
    padding: 20px 0;
    display: grid;
    grid-template-columns: 48px 64px 1fr auto;
    gap: 16px;
    align-items: start;
    transition: background 0.15s;
    position: relative;
  }

  .book-card:last-child { border-bottom: 1px solid var(--rule); }

  .book-card:hover { background: rgba(255,255,255,0.5); }
  .book-card:hover { padding-left: 8px; padding-right: 8px; margin: 0 -8px; }

  .book-number {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--rule);
    padding-top: 4px;
    text-align: right;
  }

  /* 書影 */
  .book-cover {
    width: 64px;
    height: 88px;
    object-fit: cover;
    display: block;
    box-shadow: 2px 2px 0 var(--rule);
    background: var(--paper-dark);
    flex-shrink: 0;
  }

  .book-cover-placeholder {
    width: 64px;
    height: 88px;
    background: var(--paper-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    box-shadow: 2px 2px 0 var(--rule);
    flex-shrink: 0;
    color: var(--rule);
  }

  .cover-loading {
    width: 64px;
    height: 88px;
    background: var(--paper-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 2px 2px 0 var(--rule);
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--rule);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .book-info { min-width: 0; }

  .book-author {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 2px;
  }

  .book-publisher {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--rule);
    margin-bottom: 4px;
  }

  .book-title {
    font-size: 18px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 4px;
    word-break: break-all;
  }

  .book-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  /* 検索ヒット */
  .hit-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }

  .hit-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    background: var(--highlight);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--ink);
    border: 1px solid rgba(0,0,0,0.15);
  }

  .hit-chip-label { color: var(--muted); font-size: 10px; }

  .hit-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    font-weight: 500;
  }

  /* 削除ボタン */
  .delete-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--rule);
    font-size: 16px;
    padding: 4px;
    transition: color 0.15s;
    line-height: 1;
  }

  .delete-btn:hover { color: var(--accent); }

  /* 空状態 */
  .empty-state {
    text-align: center;
    padding: 80px 0;
    color: var(--muted);
  }

  .empty-state-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
  .empty-state-text { font-size: 16px; margin-bottom: 8px; }
  .empty-state-sub {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--rule);
  }

  /* 検索結果なし */
  .no-results {
    padding: 40px 0;
    text-align: center;
    color: var(--muted);
    font-size: 15px;
    display: none;
  }

  .no-results.visible { display: block; }

  /* フッター */
  footer {
    margin-top: 60px;
    padding: 24px 0;
    border-top: 1px solid var(--rule);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--rule);
    text-align: center;
    letter-spacing: 0.1em;
  }

  /* アニメーション */
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .book-card { animation: slideIn 0.25s ease forwards; }

  /* スマホ対応 */
  @media (max-width: 600px) {
    .logo { font-size: 30px; }
    .tagline { display: none; }
    .book-card { grid-template-columns: 32px 52px 1fr auto; gap: 10px; }
    .book-cover, .book-cover-placeholder, .cover-loading { width: 52px; height: 72px; }
    .book-title { font-size: 15px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">Book<span>Shelf</span></div>
    <div class="tagline">PDF蔵書管理 · 全文検索</div>
  </header>

  <div class="search-section">
    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="書名・本文キーワードで検索…" autocomplete="off">
    </div>
    <div class="search-hint" id="searchHint">蔵書タイトルまたは本文のキーワードで絞り込めます</div>
  </div>

  <div class="toolbar">
    <div class="book-count"><strong id="countNum">0</strong> 冊の蔵書</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <button class="onedrive-btn" id="onedriveBtn">☁ OneDriveと連携</button>
      <button class="add-btn" id="addBtn">＋ PDFを追加</button>
    </div>
    <input type="file" id="fileInput" accept="application/pdf" multiple>
  </div>
  <div class="onedrive-status" id="onedriveStatus"></div>

  <div class="drop-zone" id="dropZone">
    <div class="drop-zone-icon">📚</div>
    <div class="drop-zone-text">PDFをここにドロップ</div>
    <div class="drop-zone-sub">または クリックしてファイルを選択 · 複数可</div>
  </div>

  <div class="progress-label" id="progressLabel">インデックス作成中…</div>
  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div id="bookList"></div>
  <div class="no-results" id="noResults">「<span id="noResultsWord"></span>」に一致する書籍が見つかりませんでした</div>

  <footer>BOOKSHELF PROTOTYPE · PDF.js · Google Books API · OneDrive（Microsoft Graph API）· IndexedDB永続保存</footer>
</div>

<!-- フォルダ選択モーダル -->
<div class="modal-overlay" id="folderModal" style="display:none;">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">📂 同期するフォルダを選択</div>
      <button class="modal-close" id="folderModalClose">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-hint">フォルダを選択してください。サブフォルダ内のPDFも自動で取り込まれます。</div>
      <div class="folder-breadcrumb" id="folderBreadcrumb"></div>
      <div class="folder-list" id="folderList"><div class="folder-loading">読み込み中…</div></div>
    </div>
    <div class="modal-footer">
      <div class="modal-selected-label" id="selectedFolderLabel">フォルダが選択されていません</div>
      <button class="btn-cancel" id="folderModalCancel">キャンセル</button>
      <button class="btn-confirm" id="folderModalConfirm" disabled>このフォルダを使う</button>
    </div>
  </div>
</div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  // --- MSAL / OneDrive 設定 ---
  const MSAL_CONFIG = {
    auth: {
      clientId: '92400200-6d34-4190-9868-da5cdbb57d17',
      authority: 'https://login.microsoftonline.com/consumers',
      redirectUri: window.location.href.split('?')[0],
    },
    cache: { cacheLocation: 'localStorage' }
  };
  const SCOPES = ['Files.Read'];
  const msalInstance = new msal.PublicClientApplication(MSAL_CONFIG);

  let msalAccount = null;
  let accessToken = null;

  // --- State ---
  let books = [];
  let searchTimeout = null;
  let db = null;

  // --- DOM ---
  const searchInput = document.getElementById('searchInput');
  const bookList = document.getElementById('bookList');
  const countNum = document.getElementById('countNum');
  const addBtn = document.getElementById('addBtn');
  const fileInput = document.getElementById('fileInput');
  const dropZone = document.getElementById('dropZone');
  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');
  const progressLabel = document.getElementById('progressLabel');
  const noResults = document.getElementById('noResults');
  const noResultsWord = document.getElementById('noResultsWord');
  const searchHint = document.getElementById('searchHint');
  const onedriveBtn = document.getElementById('onedriveBtn');
  const onedriveStatus = document.getElementById('onedriveStatus');

  // --- IndexedDB 初期化 ---
  function openDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open('bookshelf', 2);
      req.onupgradeneeded = e => {
        const d = e.target.result;
        if (!d.objectStoreNames.contains('books')) {
          d.createObjectStore('books', { keyPath: 'id' });
        }
      };
      req.onsuccess = e => resolve(e.target.result);
      req.onerror = () => reject(req.error);
    });
  }

  function dbGetAll() {
    return new Promise((resolve, reject) => {
      const tx = db.transaction('books', 'readonly');
      const req = tx.objectStore('books').getAll();
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  function dbPut(book) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction('books', 'readwrite');
      const req = tx.objectStore('books').put(book);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }

  function dbDelete(id) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction('books', 'readwrite');
      const req = tx.objectStore('books').delete(id);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }

  // --- Google Books API ---
  async function fetchBookInfo(title) {
    try {
      const q = encodeURIComponent(title.slice(0, 60));
      const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${q}&maxResults=1&langRestrict=ja`);
      if (!res.ok) return null;
      const data = await res.json();
      if (!data.items || !data.items.length) {
        // 日本語制限で見つからない場合は制限なしで再試行
        const res2 = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${q}&maxResults=1`);
        const data2 = await res2.json();
        if (!data2.items || !data2.items.length) return null;
        return extractBookInfo(data2.items[0]);
      }
      return extractBookInfo(data.items[0]);
    } catch(e) {
      return null;
    }
  }

  function extractBookInfo(item) {
    const info = item.volumeInfo || {};
    return {
      authors: (info.authors || []).join(', ') || null,
      publisher: info.publisher || null,
      coverUrl: info.imageLinks
        ? (info.imageLinks.thumbnail || info.imageLinks.smallThumbnail || null)
        : null,
      googleBooksId: item.id || null,
    };
  }

  // --- Microsoft / OneDrive 認証 ---
  async function getAccessToken() {
    const accounts = msalInstance.getAllAccounts();
    if (accounts.length > 0) {
      msalAccount = accounts[0];
      try {
        const result = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account: msalAccount });
        return result.accessToken;
      } catch(e) { /* サイレント失敗→ポップアップへ */ }
    }
    const result = await msalInstance.loginPopup({ scopes: SCOPES });
    msalAccount = result.account;
    return result.accessToken;
  }

  function setOnedriveStatus(msg, isError = false, showReset = false) {
    onedriveStatus.innerHTML = escHtml(msg)
      + (showReset ? ' <span id="resetFolderLink" style="cursor:pointer;text-decoration:underline;color:var(--accent);margin-left:8px;">フォルダを変更</span>' : '');
    onedriveStatus.classList.add('visible');
    onedriveStatus.style.color = isError ? 'var(--accent)' : 'var(--muted)';
    if (showReset) {
      document.getElementById('resetFolderLink')?.addEventListener('click', () => {
        localStorage.removeItem(STORAGE_KEY_FOLDER);
        setOnedriveStatus('フォルダ設定をリセットしました。次回同期時に再選択できます。');
      });
    }
  }

  // OneDriveからPDFファイル一覧を再帰取得
  async function fetchOneDrivePDFs(token, folderId = 'root') {
    const url = folderId === 'root'
      ? 'https://graph.microsoft.com/v1.0/me/drive/root/children?$filter=file ne null&$top=200'
      : `https://graph.microsoft.com/v1.0/me/drive/items/${folderId}/children?$top=200`;

    const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
    if (!res.ok) throw new Error('OneDrive APIエラー');
    const data = await res.json();

    let pdfs = [];
    for (const item of (data.value || [])) {
      if (item.folder) {
        // サブフォルダを再帰的に探索
        const sub = await fetchOneDrivePDFs(token, item.id);
        pdfs = pdfs.concat(sub);
      } else if (item.name && item.name.toLowerCase().endsWith('.pdf')) {
        pdfs.push(item);
      }
    }
    return pdfs;
  }

  // OneDriveのPDFをダウンロードしてArrayBufferで返す
  async function downloadOneDriveFile(token, itemId) {
    const res = await fetch(
      `https://graph.microsoft.com/v1.0/me/drive/items/${itemId}/content`,
      { headers: { Authorization: `Bearer ${token}` } }
    );
    if (!res.ok) throw new Error('ダウンロード失敗');
    return res.arrayBuffer();
  }

  // --- フォルダ記憶 ---
  const STORAGE_KEY_FOLDER = 'bookshelf_onedrive_folder';

  function getSavedFolder() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY_FOLDER)); } catch(e) { return null; }
  }

  function saveFolder(folder) {
    localStorage.setItem(STORAGE_KEY_FOLDER, JSON.stringify(folder));
  }

  // --- フォルダピッカー ---
  let pickerResolve = null;
  let pickerStack = [{ id: 'root', name: 'OneDrive' }]; // パンくず用スタック
  let pickerSelected = null;

  const folderModal    = document.getElementById('folderModal');
  const folderList     = document.getElementById('folderList');
  const folderBreadcrumb = document.getElementById('folderBreadcrumb');
  const selectedFolderLabel = document.getElementById('selectedFolderLabel');
  const folderModalConfirm  = document.getElementById('folderModalConfirm');

  async function loadFolderChildren(token, folderId) {
    const url = folderId === 'root'
      ? 'https://graph.microsoft.com/v1.0/me/drive/root/children?$top=200&$orderby=name'
      : `https://graph.microsoft.com/v1.0/me/drive/items/${folderId}/children?$top=200&$orderby=name`;
    const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
    if (!res.ok) throw new Error('フォルダ取得失敗');
    const data = await res.json();
    return (data.value || []).filter(i => i.folder); // フォルダのみ
  }

  function renderBreadcrumb() {
    folderBreadcrumb.innerHTML = pickerStack.map((f, i) => {
      if (i < pickerStack.length - 1) {
        return `<span class="breadcrumb-item" data-idx="${i}">${f.name}</span><span>›</span>`;
      }
      return `<span>${f.name}</span>`;
    }).join('');

    folderBreadcrumb.querySelectorAll('.breadcrumb-item').forEach(el => {
      el.addEventListener('click', async () => {
        const idx = parseInt(el.dataset.idx);
        pickerStack = pickerStack.slice(0, idx + 1);
        await renderFolderList(accessToken, pickerStack[pickerStack.length - 1].id);
      });
    });
  }

  async function renderFolderList(token, folderId) {
    folderList.innerHTML = '<div class="folder-loading">読み込み中…</div>';
    renderBreadcrumb();

    try {
      const folders = await loadFolderChildren(token, folderId);
      if (folders.length === 0) {
        folderList.innerHTML = '<div class="folder-loading">サブフォルダがありません</div>';
        return;
      }
      folderList.innerHTML = '';
      folders.forEach(f => {
        const el = document.createElement('div');
        el.className = 'folder-item';
        if (pickerSelected && pickerSelected.id === f.id) el.classList.add('selected');
        el.innerHTML = `
          <span class="folder-item-icon">📁</span>
          <span class="folder-item-name">${escHtml(f.name)}</span>
          <span class="folder-item-arrow">▶</span>`;

        // クリック：選択確定
        el.addEventListener('click', () => {
          folderList.querySelectorAll('.folder-item').forEach(i => i.classList.remove('selected'));
          el.classList.add('selected');
          pickerSelected = { id: f.id, name: f.name, path: pickerStack.map(s => s.name).concat(f.name).join(' / ') };
          selectedFolderLabel.textContent = '選択中：' + pickerSelected.path;
          folderModalConfirm.disabled = false;
        });

        // 矢印クリック：フォルダを開く
        el.querySelector('.folder-item-arrow').addEventListener('click', async e => {
          e.stopPropagation();
          pickerStack.push({ id: f.id, name: f.name });
          await renderFolderList(token, f.id);
        });

        folderList.appendChild(el);
      });
    } catch(err) {
      folderList.innerHTML = '<div class="folder-loading">⚠ 読み込みに失敗しました</div>';
    }
  }

  function openFolderPicker(token) {
    return new Promise(resolve => {
      pickerResolve = resolve;
      pickerSelected = null;
      pickerStack = [{ id: 'root', name: 'OneDrive' }];
      selectedFolderLabel.textContent = 'フォルダが選択されていません';
      folderModalConfirm.disabled = true;
      folderModal.style.display = 'flex';
      renderFolderList(token, 'root');
    });
  }

  document.getElementById('folderModalClose').addEventListener('click', () => {
    folderModal.style.display = 'none';
    if (pickerResolve) { pickerResolve(null); pickerResolve = null; }
  });

  document.getElementById('folderModalCancel').addEventListener('click', () => {
    folderModal.style.display = 'none';
    if (pickerResolve) { pickerResolve(null); pickerResolve = null; }
  });

  folderModalConfirm.addEventListener('click', () => {
    folderModal.style.display = 'none';
    if (pickerResolve) { pickerResolve(pickerSelected); pickerResolve = null; }
  });

  // --- OneDrive連携メイン処理 ---
  async function syncOneDrive() {
    try {
      onedriveBtn.textContent = '⏳ 接続中…';
      onedriveBtn.disabled = true;

      accessToken = await getAccessToken();

      // フォルダ設定を確認：未設定なら選択モーダルを開く
      let folder = getSavedFolder();
      if (!folder) {
        setOnedriveStatus('📂 同期するフォルダを選択してください…');
        folder = await openFolderPicker(accessToken);
        if (!folder) {
          // キャンセル
          onedriveBtn.textContent = '☁ OneDriveと連携';
          onedriveBtn.disabled = false;
          setOnedriveStatus('フォルダの選択がキャンセルされました');
          return;
        }
        saveFolder(folder);
      }

      setOnedriveStatus(`📂 「${folder.name}」内のPDFを検索中…`);
      const pdfItems = await fetchOneDrivePDFs(accessToken, folder.id);

      // 既登録のファイルを除外
      const newItems = pdfItems.filter(item => {
        const name = item.name.replace(/\.pdf$/i, '');
        return !books.find(b => b.name === name);
      });

      onedriveBtn.textContent = '✓ OneDrive連携中';
      onedriveBtn.classList.add('connected');
      onedriveBtn.disabled = false;

      if (newItems.length === 0) {
        setOnedriveStatus(`✓ 同期完了 — 新しいPDFはありませんでした（フォルダ：${folder.path || folder.name}）`);
        return;
      }

      setOnedriveStatus(`📥 ${newItems.length}冊の新しいPDFが見つかりました。取り込み中…`);
      progressBar.classList.add('active');
      progressLabel.classList.add('active');

      for (let i = 0; i < newItems.length; i++) {
        const item = newItems[i];
        const name = item.name.replace(/\.pdf$/i, '');

        progressLabel.textContent = `OneDrive取込中 (${i + 1}/${newItems.length})：${name}`;
        progressFill.style.width = ((i / newItems.length) * 100) + '%';

        try {
          const arrayBuffer = await downloadOneDriveFile(accessToken, item.id);
          const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
          const pages = [];
          for (let p = 1; p <= pdf.numPages; p++) {
            const page = await pdf.getPage(p);
            const textContent = await page.getTextContent();
            const text = textContent.items.map(it => it.str).join(' ');
            if (text.trim()) pages.push({ page: p, text });
          }

          progressLabel.textContent = `書誌情報を取得中：${name}`;
          const bookInfo = await fetchBookInfo(name);

          const book = {
            id: Date.now() + Math.random(),
            name,
            numPages: pdf.numPages,
            pages,
            authors: bookInfo?.authors || null,
            publisher: bookInfo?.publisher || null,
            coverUrl: bookInfo?.coverUrl || null,
            oneDriveId: item.id,
            oneDriveWebUrl: item.webUrl || null,
            addedAt: new Date().toISOString()
          };
          await dbPut(book);
          books.push(book);
          renderBooks(searchInput.value.trim());
        } catch(e) {
          console.error('取込失敗:', name, e);
        }
      }

      progressFill.style.width = '100%';
      setTimeout(() => {
        progressBar.classList.remove('active');
        progressLabel.classList.remove('active');
        progressFill.style.width = '0%';
      }, 600);

      setOnedriveStatus(`✓ OneDrive同期完了 — ${newItems.length}冊を「${folder.name}」から取り込みました`, false, true);

    } catch(e) {
      console.error('OneDrive連携エラー:', e);
      onedriveBtn.textContent = '☁ OneDriveと連携';
      onedriveBtn.disabled = false;
      setOnedriveStatus('⚠ 連携に失敗しました。再度お試しください。', true);
    }
  }

  // --- PDF解析 ---
  async function parsePDF(file) {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    const pages = [];

    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const textContent = await page.getTextContent();
      const text = textContent.items.map(item => item.str).join(' ');
      if (text.trim()) {
        pages.push({ page: i, text });
      }
    }

    return { numPages: pdf.numPages, pages };
  }

  // --- ファイル処理 ---
  async function processFiles(files) {
    const fileArray = Array.from(files).filter(f => f.type === 'application/pdf');
    if (!fileArray.length) return;

    dropZone.classList.remove('active-zone');
    progressBar.classList.add('active');
    progressLabel.classList.add('active');

    for (let i = 0; i < fileArray.length; i++) {
      const file = fileArray[i];
      const name = file.name.replace(/\.pdf$/i, '');

      // 重複チェック
      if (books.find(b => b.name === name)) {
        continue;
      }

      progressLabel.textContent = `解析中 (${i + 1}/${fileArray.length})：${name}`;
      progressFill.style.width = ((i / fileArray.length) * 100) + '%';

      try {
        const { numPages, pages } = await parsePDF(file);

        // Google Books APIで書誌情報を取得
        progressLabel.textContent = `書誌情報を取得中：${name}`;
        const bookInfo = await fetchBookInfo(name);

        const book = {
          id: Date.now() + Math.random(),
          name,
          numPages,
          pages,
          authors: bookInfo?.authors || null,
          publisher: bookInfo?.publisher || null,
          coverUrl: bookInfo?.coverUrl || null,
          addedAt: new Date().toISOString()
        };
        await dbPut(book);
        books.push(book);
      } catch (e) {
        console.error('PDF parse error:', e);
      }
    }

    progressFill.style.width = '100%';
    setTimeout(() => {
      progressBar.classList.remove('active');
      progressLabel.classList.remove('active');
      progressFill.style.width = '0%';
    }, 600);

    renderBooks(searchInput.value.trim());
  }

  // saveBooks は不要になったため削除（dbPut で都度保存）

  // --- 検索 ---
  function search(query) {
    if (!query) return books.map(b => ({ book: b, hits: [] }));

    const q = query.toLowerCase();
    const results = [];

    for (const book of books) {
      // タイトルマッチ
      const titleMatch = book.name.toLowerCase().includes(q);

      // 本文マッチ（ページ単位）
      const hitPages = [];
      if (book.pages) {
        for (const p of book.pages) {
          if (p.text.toLowerCase().includes(q)) {
            // ヒット箇所の前後を抜粋
            const idx = p.text.toLowerCase().indexOf(q);
            const start = Math.max(0, idx - 20);
            const end = Math.min(p.text.length, idx + query.length + 30);
            const snippet = (start > 0 ? '…' : '') + p.text.slice(start, end) + (end < p.text.length ? '…' : '');
            hitPages.push({ page: p.page, snippet });
          }
        }
      }

      if (titleMatch || hitPages.length > 0) {
        results.push({ book, hits: hitPages, titleMatch });
      }
    }

    // ヒット数順にソート
    results.sort((a, b) => b.hits.length - a.hits.length);
    return results;
  }

  // --- 描画 ---
  function renderBooks(query) {
    const results = search(query);
    countNum.textContent = books.length;
    bookList.innerHTML = '';

    if (books.length === 0) {
      bookList.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">📖</div>
          <div class="empty-state-text">まだ蔵書がありません</div>
          <div class="empty-state-sub">「＋ PDFを追加」からPDFをインポートしてください</div>
        </div>`;
      noResults.classList.remove('visible');
      return;
    }

    if (query && results.length === 0) {
      noResultsWord.textContent = query;
      noResults.classList.add('visible');
      return;
    }

    noResults.classList.remove('visible');

    results.forEach(({ book, hits, titleMatch }, idx) => {
      const card = document.createElement('div');
      card.className = 'book-card';

      // 書影
      const coverHTML = book.coverUrl
        ? `<img class="book-cover" src="${book.coverUrl.replace('http://', 'https://')}" alt="${escHtml(book.name)}" loading="lazy" onerror="this.outerHTML='<div class=\\'book-cover-placeholder\\'>📖</div>'">`
        : `<div class="book-cover-placeholder">📖</div>`;

      const hitsHTML = hits.length > 0
        ? `<div class="hit-list">
            ${hits.slice(0, 8).map(h =>
              `<span class="hit-chip" title="${escHtml(h.snippet)}">
                <span class="hit-chip-label">p.</span>${h.page}
              </span>`
            ).join('')}
            ${hits.length > 8 ? `<span class="hit-count">+${hits.length - 8}ページ</span>` : ''}
           </div>`
        : '';

      const matchBadge = query && titleMatch
        ? `<span style="font-family:'DM Mono',monospace;font-size:10px;background:var(--accent);color:white;padding:2px 6px;margin-left:8px;">書名一致</span>`
        : '';

      const queryBadge = query && hits.length > 0
        ? `<span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);">${hits.length}ページでヒット</span>`
        : '';

      const authorHTML = book.authors
        ? `<div class="book-author">${escHtml(book.authors)}</div>` : '';
      const publisherHTML = book.publisher
        ? `<div class="book-publisher">${escHtml(book.publisher)}</div>` : '';

      card.innerHTML = `
        <div class="book-number">${String(idx + 1).padStart(2, '0')}</div>
        ${coverHTML}
        <div class="book-info">
          <div class="book-title">${escHtml(book.name)}${matchBadge}</div>
          ${authorHTML}
          ${publisherHTML}
          <div class="book-meta">${book.numPages}ページ · 登録日 ${formatDate(book.addedAt)} ${queryBadge}</div>
          ${hitsHTML}
        </div>
        <button class="delete-btn" data-id="${book.id}" title="削除">✕</button>`;

      bookList.appendChild(card);
    });

    // 検索ヒント更新
    if (query) {
      searchHint.textContent = `「${query}」— ${results.length}件の書籍が見つかりました`;
    } else {
      searchHint.textContent = '蔵書タイトルまたは本文のキーワードで絞り込めます';
    }
  }

  // --- ユーティリティ ---
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
  }

  // --- イベント ---
  addBtn.addEventListener('click', () => {
    dropZone.classList.toggle('active-zone');
  });

  dropZone.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', e => {
    processFiles(e.target.files);
    fileInput.value = '';
  });

  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });

  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));

  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    processFiles(e.dataTransfer.files);
  });

  // ドラッグ＆ドロップ（ページ全体）
  document.addEventListener('dragover', e => {
    e.preventDefault();
    if (!dropZone.classList.contains('active-zone')) {
      dropZone.classList.add('active-zone');
    }
  });

  document.addEventListener('dragleave', e => {
    if (!e.relatedTarget) dropZone.classList.remove('drag-over');
  });

  document.addEventListener('drop', e => {
    e.preventDefault();
    processFiles(e.dataTransfer.files);
  });

  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      renderBooks(searchInput.value.trim());
    }, 200);
  });

  onedriveBtn.addEventListener('click', syncOneDrive);

  // 削除
  bookList.addEventListener('click', async e => {
    const btn = e.target.closest('.delete-btn');
    if (!btn) return;
    const id = parseFloat(btn.dataset.id);
    await dbDelete(id);
    books = books.filter(b => b.id !== id);
    renderBooks(searchInput.value.trim());
  });

  // --- 初期表示：IndexedDBから全データ読み込み ---
  async function init() {
    // MSAL リダイレクト処理（ポップアップ失敗時のフォールバック）
    try {
      await msalInstance.handleRedirectPromise();
    } catch(e) {}

    // ログイン済みなら連携ボタンを「接続中」表示に
    const accounts = msalInstance.getAllAccounts();
    if (accounts.length > 0) {
      msalAccount = accounts[0];
      onedriveBtn.textContent = '✓ OneDrive連携中';
      onedriveBtn.classList.add('connected');
      const saved = getSavedFolder();
      const folderLabel = saved ? `フォルダ：${saved.path || saved.name}` : 'フォルダ未設定';
      setOnedriveStatus(`接続済み：${msalAccount.username} · ${folderLabel} — ボタンを押すと再同期します`);
    }

    db = await openDB();
    books = await dbGetAll();
    books.sort((a, b) => new Date(a.addedAt) - new Date(b.addedAt));
    renderBooks('');

    // 書誌情報が未取得の書籍があれば非同期でバックグラウンド取得
    const needsFetch = books.filter(b => b.authors === undefined && b.coverUrl === undefined);
    if (needsFetch.length > 0) {
      for (const book of needsFetch) {
        const info = await fetchBookInfo(book.name);
        if (info) {
          book.authors = info.authors;
          book.publisher = info.publisher;
          book.coverUrl = info.coverUrl;
          await dbPut(book);
        } else {
          book.authors = null;
          book.publisher = null;
          book.coverUrl = null;
          await dbPut(book);
        }
        renderBooks(searchInput.value.trim());
      }
    }
  }

  init();
</script>
</body>
